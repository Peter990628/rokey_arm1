<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ page_title }} · 약국 업무 보조 로봇</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Sunflower:wght@300;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_css %}{% endblock %}
</head>
<body>

<div id="alertBanner" class="alert-banner">🚨 <span id="alertText"></span></div>

<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-emoji">💊</span>
      <div>
        <div class="brand-title display-font">약국 보조 로봇</div>
        <div class="brand-sub">🤖 Pharmacy Operator</div>
      </div>
    </div>

    <a class="nav-link {{ 'active' if active_page == 'dashboard' else '' }}" href="{{ url_for('dashboard') }}">
      <span class="nav-emoji">🏠</span>
      대시보드
    </a>
    <a class="nav-link {{ 'active' if active_page == 'inventory' else '' }}" href="{{ url_for('inventory_page') }}">
      <span class="nav-emoji">📦</span>
      재고 현황
    </a>
    <a class="nav-link {{ 'active' if active_page == 'production' else '' }}" href="{{ url_for('production') }}">
      <span class="nav-emoji">🔬</span>
      제조 현황
    </a>
    <a class="nav-link {{ 'active' if active_page == 'prescription' else '' }}" href="{{ url_for('prescription') }}">
      <span class="nav-emoji">📝</span>
      처방전 입력
    </a>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <h1 class="display-font">{{ page_title }}</h1>
      <div class="clock mono" id="clock">🕐 --:--:--</div>
    </div>
    <div class="page-content">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='socket.io.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/common.js') }}"></script>
{% block extra_js %}{% endblock %}

</body>
</html>
